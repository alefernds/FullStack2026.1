<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Servidor</title>
</head>
<body>
    <h1>Servidor rodando...</h1>
    <h2>Alessandra Queiroz</h2>

    <h3>Exemplos de formulários</h3>

    <form action="/inicio">
        <input type="text" name="text">
        <br>
        <input type="number" name="number">
        <br>
        <input type="checkbox" name="checkbox">
        <br>
        <input type="radio">
        <br>
        <input type="color" name="color">
        <br>
        <input type="date">
        <br>
        <input type="email">
        <br>
        <input type="password">
        <br>
        <input type="submit" value="enviar por post" formmethod="post">
        <br>
        <input type="submit" value="enviar por get" formmethod="get">
    </form>

    <h3>Exemplos de cadastro</h3> 
    <form action="/cadastro" method="POST">
        <p>Nome: <input type="text" name="nome"></p>
        <p>Login: <input type="text" name="login"></p>
        <p>Senha: <input type="password" name="senha"></p>
        <input type="submit" value="Cadastrar">
    </form>

    <h3>Exemplos de uso de FOR no ejs</h3>
    <form method="get" action="/for">
        <p>Indique a quantidade de DIVs:</p>
        <input type="number" name="qtde">
        <br>
        <input type="submit">
    </form>

    <h3>Exemplo de Banco de Dados - Create</h3>
    <form method="post" action="/cadastrar_usuario">
        <p>Nome: <input type="text" name="nome"></p>
        <p>Login: <input type="text" name="login"></p>
        <p>Senha: <input type="password" name="senha"></p>
        <input type="submit" value="Cadastrar">
    </form>

    <h3>Exemplo de Banco de Dados - Read</h3>
    <form method="post" action="/logar_usuario">
        <p>Login: <input type="text" name="login"></p>
        <p>Senha: <input type="password" name="senha"></p>
        <input type="submit" value="Logar">
    </form>


</body>
</html>
